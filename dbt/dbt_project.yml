name: paystream
version: '1.0.0'
config-version: 2
profile: clickhouse

model-paths: ["models"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

models:
  paystream:
    staging:
      +materialized: ephemeral
    intermediate:
      +materialized: view
      +schema: silver
    marts:
      +materialized: incremental
      +schema: gold
      +incremental_strategy: delete+insert
      +on_schema_change: fail

snapshots:
  paystream:
    +schema: silver

seeds:
  paystream:
    +schema: silver
