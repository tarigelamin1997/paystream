version: 2
models:
  - name: gold_merchant_daily_kpis
    description: "Daily merchant KPIs: GMV, tx count, approval rate, basket size"
    config:
      unique_key: "(merchant_id, date)"
      incremental_strategy: delete+insert
    columns:
      - name: gmv
        tests:
          - not_null
  - name: gold_user_cohorts
    description: "User cohort analysis: LTV, retention, reorder rate"
    config:
      unique_key: "(cohort_month, user_id)"
      incremental_strategy: delete+insert
  - name: gold_settlement_reconciliation
    description: "Daily settlement reconciliation per merchant"
    config:
      unique_key: "(settlement_date, merchant_id)"
      incremental_strategy: delete+insert
  - name: gold_risk_dashboard
    description: "Daily risk metrics: approval/decline rates, latency, exposure"
    config:
      unique_key: "(date)"
      incremental_strategy: delete+insert
